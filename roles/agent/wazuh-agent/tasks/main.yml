---
- name: Télécharger le paquet Wazuh Agent
  ansible.builtin.get_url:
    url: "https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_4.7.3-1_amd64.deb"
    dest: /tmp/wazuh-agent.deb

- name: Installer le paquet Wazuh Agent
  ansible.builtin.apt:
    deb: /tmp/wazuh-agent.deb
    state: present

- name: Déployer la configuration Wazuh Agent
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    mode: '0640'
    owner: root
    group: wazuh
  notify: restart wazuh-agent

- name: Démarrer et activer wazuh-agent
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
    enabled: yes

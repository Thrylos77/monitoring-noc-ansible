---
- name: Créer l'utilisateur otel-collector
  ansible.builtin.user:
    name: otelcol
    shell: /usr/sbin/nologin
    system: yes
    create_home: no

- name: Télécharger otel-collector
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_collector_version }}/otelcol-contrib_{{ otel_collector_version }}_linux_amd64.tar.gz"
    dest: "/tmp/otelcol-{{ otel_collector_version }}.tar.gz"

- name: Extraire otel-collector
  ansible.builtin.unarchive:
    src: "/tmp/otelcol-{{ otel_collector_version }}.tar.gz"
    dest: /tmp/
    remote_src: yes

- name: Copier le binaire
  ansible.builtin.copy:
    src: /tmp/otelcol-contrib
    dest: /usr/local/bin/otelcol
    mode: '0755'
    owner: otelcol
    group: otelcol
    remote_src: yes

- name: Créer le répertoire de configuration
  ansible.builtin.file:
    path: /etc/otelcol
    state: directory
    mode: '0755'

- name: Déployer la configuration otel-collector
  ansible.builtin.template:
    src: otel-collector.yml.j2
    dest: /etc/otelcol/config.yml
    mode: '0644'
    owner: otelcol
    group: otelcol
  notify: restart otelcol

- name: Déployer le service systemd
  ansible.builtin.template:
    src: otelcol.service.j2
    dest: /etc/systemd/system/otelcol.service
    mode: '0644'
  notify: restart otelcol

- name: Démarrer et activer otel-collector
  ansible.builtin.systemd:
    name: otelcol
    state: started
    enabled: yes
    daemon_reload: yes

apiVersion: 1.0

datasources:

  - name: Prometheus
    type: prometheus
    url: "http://localhost:{{ prometheus_port }}"
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    url: "http://localhost:{{ loki_port }}"
    editable: false

  - name: Tempo
    type: tempo
    url: "http://localhost:{{ tempo_port }}"
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    url: "http://localhost:9200"
    database: "wazuh-alerts-*"
    editable: false

  - name: AlertManager
    type: alertmanager
    url: "http://localhost:{{ alertmanager_port }}"
    editable: false

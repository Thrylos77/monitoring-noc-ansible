---
- name: Mettre à jour le cache apt
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Mettre à jour tous les paquets
  ansible.builtin.apt:
    upgrade: dist
  when: update_packages | default(true) | bool

- name: Installer les outils de base
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Configurer sysctl (hardening réseau)
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-noc.conf
    mode: '0644'
  notify: reload sysctl

- name: Activer ufw
  community.general.ufw:
    state: enabled
    policy: deny

- name: Autoriser SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Installer et démarrer fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Démarrer fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: yes

- name: Installer et configurer chrony (NTP)
  ansible.builtin.apt:
    name: chrony
    state: present

- name: Démarrer chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: yes
